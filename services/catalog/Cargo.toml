[package]
name = "catalog"
version = "0.1.0"
edition.workspace = true
license.workspace = true
rust-version.workspace = true
publish = false
description = "Catalog service (Phase 3). TMF620 read surface + admin writes + the v1.1 promotion subsystem (two-system saga over external loyalty-cli). Port of services/catalog."

[lints]
workspace = true

[lib]
name = "catalog"
path = "src/lib.rs"

[[bin]]
name = "catalog"
path = "src/main.rs"

[dependencies]

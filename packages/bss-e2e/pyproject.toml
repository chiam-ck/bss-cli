[project]
name = "bss-e2e"
version = "0.1.0"
requires-python = ">=3.12"
description = "v1.4 — Playwright-driven end-to-end suite for BSS-CLI self-serve portal + operator cockpit veneer"
license = "Apache-2.0"
dependencies = [
    # Test framework + reporting
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "pytest-html>=4.1",
    # Browser automation
    "playwright>=1.45",
    # State setup + verification
    "bss-clients",
    "httpx>=0.27",
    "asyncpg>=0.29",
]

[tool.uv.sources]
bss-clients = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.pytest.ini_options]
# Inherits asyncio_mode and --import-mode=importlib from the root
# pyproject.toml; this section only adds package-local knobs.
testpaths = ["tests"]
markers = [
    "self_serve: spec drives the self-serve portal (localhost:9001).",
    "cockpit: spec drives the operator cockpit browser veneer (localhost:9002).",
]
